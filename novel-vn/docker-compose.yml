services:
  backend:
    build: .
    ports:
      - "4557:8000"
    environment:
      - AI_DEEPSEEK_API_KEY=${AI_DEEPSEEK_API_KEY}
      - DATA_DIR=/app/data
      - IMAGE_DIR=/app/data/images
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-me}
      - EVOLINK_API_KEY=${EVOLINK_API_KEY}
    volumes:
      - ../data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "4556:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    restart: unless-stopped
    depends_on:
      - backend

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "4558:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
